<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>一週年紀念相簿</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #1a1a1a; /* 使用深色背景讓照片更亮眼 */
            overflow: hidden; /* 禁止上下捲動 */
        }

        /* 滑動容器 */
        .slider-container {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory; /* 核心：強制對齊 */
            height: 100vh;
            -webkit-overflow-scrolling: touch; /* 讓手機滑動更順暢 */
        }

        /* 隱藏滾動條 */
        .slider-container::-webkit-scrollbar { display: none; }

        /* 每一頁照片 */
        .slide {
            min-width: 100vw;
            height: 100vh;
            scroll-snap-align: start; /* 對齊點 */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .slide img {
            width: 90%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        /* 文字內容 */
        .caption {
            color: white;
            padding: 20px;
            text-align: center;
            width: 90%;
        }

        .caption h2 { margin: 10px 0 5px; font-size: 1.2rem; color: #ff7e67; }
        .caption p { margin: 0; font-size: 1rem; line-height: 1.5; opacity: 0.9; }

        /* 左右滑動提示語 */
        .hint {
            position: absolute;
            bottom: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            width: 100%;
            text-align: center;
            animation: breathe 2s infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

<div class="slider-container">
    <div class="slide" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('你的照片網址.jpg') center/cover;">
        <div class="caption">
            <h1 style="font-size: 2.5rem;">Happy 1st Anniversary</h1>
            <p>親愛的，往左滑看看我們的回憶</p>
        </div>
        <div class="hint">〈〈 左右滑動觀看 〉〉</div>
    </div>

    <div class="slide">
        <img src="你的照片連結1.jpg" alt="Memory 1">
        <div class="caption">
            <h2>2025.04.20</h2>
            <p>這天是我們第一次見面，你的笑容我到現在都記得。</p>
        </div>
    </div>

    <div class="slide">
        <img src="你的照片連結2.jpg" alt="Memory 2">
        <div class="caption">
            <h2>2025.08.15</h2>
            <p>雖然隔著螢幕，但那晚我們聊了好久好久。</p>
        </div>
    </div>

    <div class="slide">
        <div class="caption">
            <h2 style="font-size: 1.8rem;">To Be Continued...</h2>
            <p>未來的日子，我們也要一直走下去。</p>
        </div>
    </div>
</div>

</body>
</html>
