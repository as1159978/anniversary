<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的一週年快樂</title>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #fdf2f2; /* 淡淡的粉紅色 */
            color: #4a4a4a;
        }
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=800&q=80'); /* 封面圖 */
            background-size: cover;
            color: white;
        }
        .section {
            padding: 50px 20px;
            max-width: 600px;
            margin: auto;
            text-align: center;
        }
        .photo-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        .photo-card img {
            width: 100%;
            border-radius: 5px;
        }
        .date {
            font-size: 0.9em;
            color: #ff7e67;
            font-weight: bold;
            margin-top: 10px;
        }
        .story {
            line-height: 1.6;
            margin-top: 10px;
        }
        footer {
            padding: 50px;
            text-align: center;
            background: #ff7e67;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Our First Year</h1>
    <p>親愛的，這是我們一起走過的一整年</p>
</header>

<div class="section">
    <div class="photo-card">
        <img src="你的照片連結1.jpg" alt="第一次見面">
        <div class="date">2025.04.20 - 初遇</div>
        <p class="story">還記得那天在車站見到你，心臟跳得好快。雖然隔著螢幕聊了很久，但見到本人的那一刻，我就知道你是那個對的人。</p>
    </div>

    <div class="photo-card">
        <img src="你的照片連結2.jpg" alt="遠端約會">
        <div class="date">2025.08.15 - 視訊晚餐</div>
        <p class="story">雖然我們隔著 300 公里，但只要開著視訊吃同樣的晚餐，就覺得你好像就在我身邊。</p>
    </div>

    </div>

<footer>
    <h2>一週年快樂！</h2>
    <p>期待下一個 365 天，我也在你身邊。</p>
</footer>

</body>
</html>
